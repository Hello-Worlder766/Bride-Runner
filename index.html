<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Here Comes the Bride</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Dancing+Script:wght@600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fdf0f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Playfair Display', serif;
    touch-action: none;
  }
  h1 {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.3rem, 4vw, 1.9rem);
    color: #c2185b;
    margin-bottom: 4px;
  }
  #score-display {
    font-size: 0.9rem;
    color: #999;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  #game-wrap {
    position: relative;
    width: min(600px, 96vw);
  }
  #bonus-pop {
    position: absolute;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Dancing Script', cursive;
    font-size: 1.3rem;
    color: #c2185b;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
    text-shadow: 0 1px 4px rgba(255,255,255,0.9);
  }
  canvas {
    display: block;
    width: 100%;
    border: 2px solid #f8bbd0;
    border-radius: 12px;
    background: #fff9fb;
    box-shadow: 0 8px 32px rgba(194,24,91,0.10);
    cursor: pointer;
  }
  #message {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1rem, 3.5vw, 1.3rem);
    color: #c2185b;
    text-align: center;
    margin-top: 8px;
    min-height: 1.6em;
  }
  #hint {
    font-size: 0.72rem;
    color: #ccc;
    text-align: center;
    margin-top: 4px;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<h1>💍 Here Comes the Bride</h1>
<div id="score-display">SCORE: <span id="score">0</span> &nbsp;|&nbsp; BEST: <span id="best">0</span></div>

<div id="game-wrap">
  <canvas id="c"></canvas>
  <div id="bonus-pop"></div>
</div>

<div id="message">Tap or Space to start!</div>
<div id="hint">↑ / tap top = jump &nbsp;•&nbsp; ↓ / tap bottom = duck &nbsp;•&nbsp; catch 🌹🥂💍 for points</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const msg = document.getElementById('message');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const bonusPop = document.getElementById('bonus-pop');

const W = 600, H = 260;
canvas.width = W;
canvas.height = H;

const GROUND_Y  = H - 35;   // feet land here
const NORMAL_H  = 52;
const DUCK_H    = 28;
const BRIDE_W   = 32;
const AIR_Y     = GROUND_Y - NORMAL_H - 44; // collectible height (jump to reach)

let state = 'idle';
let score = 0, bonus = 0, best = 0, frame = 0, speed = 4;
let jumpCount = 0, isDucking = false, popTimer = null;

const bride = {
  x: 85, y: GROUND_Y - NORMAL_H,
  w: BRIDE_W, h: NORMAL_H,
  vy: 0, grounded: true,
  animFrame: 0, animTick: 0,
};

function brideJump() {
  if (jumpCount < 2) {
    bride.vy = -13.5;
    bride.grounded = false;
    isDucking = false;
    bride.h = NORMAL_H;
    jumpCount++;
  }
}

function startDuck() {
  if (!bride.grounded) return;
  isDucking = true;
  bride.h = DUCK_H;
  bride.y = GROUND_Y - DUCK_H;
}

function stopDuck() {
  if (!isDucking) return;
  isDucking = false;
  bride.h = NORMAL_H;
  bride.y = GROUND_Y - NORMAL_H;
}

// --- Objects ---
let obstacles    = [];
let collectibles = [];
let petals       = [];
let nextSpawn    = 85;

const HAZARDS = [
  { label: '💔', w: 28, h: 32 },
  { label: '💔', w: 34, h: 40 },
  { label: '💔', w: 22, h: 26 },
];

const COLLECTIBLES = [
  { label: '🌹', pts: 10, w: 24, h: 24 },
  { label: '🥂', pts: 20, w: 24, h: 28 },
  { label: '💍', pts: 50, w: 22, h: 22 },
];

function spawnGroup() {
  const roll = Math.random();
  if (roll < 0.50) {
    // Ground hazard only
    const h = HAZARDS[Math.floor(Math.random() * HAZARDS.length)];
    obstacles.push({ x: W + 10, y: GROUND_Y - h.h, w: h.w, h: h.h, label: h.label });
  } else if (roll < 0.78) {
    // Aerial collectible only
    const c = COLLECTIBLES[Math.floor(Math.random() * COLLECTIBLES.length)];
    collectibles.push({ x: W + 10, y: AIR_Y, w: c.w, h: c.h, label: c.label, pts: c.pts });
  } else {
    // Both — jump to collect AND clear ground hazard
    const h = HAZARDS[Math.floor(Math.random() * HAZARDS.length)];
    const c = COLLECTIBLES[Math.floor(Math.random() * COLLECTIBLES.length)];
    obstacles.push({ x: W + 10, y: GROUND_Y - h.h, w: h.w, h: h.h, label: h.label });
    collectibles.push({ x: W + 10, y: AIR_Y, w: c.w, h: c.h, label: c.label, pts: c.pts });
  }
}

function spawnPetal() {
  petals.push({
    x: Math.random() * W, y: -10,
    size: 4 + Math.random() * 5,
    speed: 0.5 + Math.random() * 1,
    drift: (Math.random() - 0.5) * 0.5,
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.07,
    alpha: 0.35 + Math.random() * 0.4,
    hue: 335 + Math.random() * 25,
  });
}

// --- Collision ---
function overlaps(ax, ay, aw, ah, bx, by, bw, bh, pad) {
  pad = pad || 0;
  return ax + pad < bx + bw - pad &&
         ax + aw - pad > bx + pad &&
         ay + pad < by + bh - pad &&
         ay + ah - pad > by + pad;
}

// --- Draw ---
function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  grad.addColorStop(0, '#fff9fb');
  grad.addColorStop(1, '#fce4ec');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, GROUND_Y);
  // scrolling hearts
  ctx.font = '13px serif';
  ctx.globalAlpha = 0.1;
  ctx.fillStyle = '#c2185b';
  for (let i = 0; i < 7; i++) {
    const hx = ((i * 95 - frame * speed * 0.12) % (W + 40) + W + 40) % (W + 40) - 20;
    ctx.fillText('♥', hx, 22 + (i % 3) * 12);
  }
  ctx.globalAlpha = 1;
}

function drawGround() {
  ctx.fillStyle = '#f8bbd0';
  ctx.fillRect(0, GROUND_Y, W, 4);
  ctx.fillStyle = '#fce4ec';
  ctx.fillRect(0, GROUND_Y + 4, W, H - GROUND_Y - 4);
  // aisle dots
  ctx.fillStyle = '#f48fb1';
  const offset = 44 - ((frame * speed * 0.4) % 44);
  for (let x = offset; x < W; x += 44) {
    ctx.beginPath();
    ctx.arc(x, GROUND_Y + 2, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBride() {
  const b = bride;
  const feet = b.y + b.h;
  const cx = b.x;

  if (isDucking && b.grounded) {
    // Ducked: flat ellipse body + head forward
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#f8bbd0';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(cx - 2, feet - 13, 20, 13, 0, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    // head
    ctx.fillStyle = '#ffe0b2';
    ctx.beginPath();
    ctx.arc(cx + 14, feet - 15, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#5d4037';
    ctx.beginPath();
    ctx.arc(cx + 14, feet - 19, 5.5, Math.PI, 0);
    ctx.fill();
    // mini veil
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath();
    ctx.moveTo(cx + 14, feet - 22);
    ctx.lineTo(cx + 24, feet - 16);
    ctx.lineTo(cx + 20, feet - 8);
    ctx.closePath();
    ctx.fill();
    return;
  }

  // Dress
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#f8bbd0';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx - 5, feet - 22);
  ctx.lineTo(cx - 15, feet);
  ctx.lineTo(cx + 15, feet);
  ctx.lineTo(cx + 5, feet - 22);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Torso
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#f8bbd0';
  ctx.fillRect(cx - 9, feet - 38, 18, 17);
  ctx.strokeRect(cx - 9, feet - 38, 18, 17);

  // Veil
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.beginPath();
  ctx.moveTo(cx + 3, feet - 48);
  ctx.lineTo(cx + 20, feet - 36);
  ctx.lineTo(cx + 14, feet - 14);
  ctx.closePath();
  ctx.fill();

  // Head
  ctx.fillStyle = '#ffe0b2';
  ctx.beginPath();
  ctx.arc(cx, feet - 42, 7.5, 0, Math.PI * 2);
  ctx.fill();

  // Hair
  ctx.fillStyle = '#5d4037';
  ctx.beginPath();
  ctx.arc(cx, feet - 46, 6.5, Math.PI, 0);
  ctx.fill();

  // Bouquet
  ctx.fillStyle = '#f06292';
  ctx.beginPath();
  ctx.arc(cx - 11, feet - 28, 5.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff176';
  ctx.beginPath();
  ctx.arc(cx - 11, feet - 28, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Legs
  b.animTick++;
  if (b.grounded && b.animTick % 6 === 0) b.animFrame = (b.animFrame + 1) % 4;
  const lo = b.grounded ? Math.sin(b.animFrame * 1.6) * 5 : 0;
  ctx.strokeStyle = '#f8bbd0';
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(cx - 5, feet - 3); ctx.lineTo(cx - 5 + lo, feet + 9); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 5, feet - 3); ctx.lineTo(cx + 5 - lo, feet + 9); ctx.stroke();
}

function drawItem(item) {
  // Use 'bottom' baseline so emoji sits flush at item.y + item.h (the floor)
  ctx.font = `${item.h}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText(item.label, item.x + item.w / 2, item.y + item.h);
}

function drawPetals() {
  petals.forEach(p => {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = `hsl(${p.hue},80%,80%)`;
    ctx.beginPath();
    ctx.ellipse(0, 0, p.size / 2, p.size, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
  ctx.globalAlpha = 1;
}

function drawHUD() {
  ctx.fillStyle = 'rgba(255,240,248,0.72)';
  ctx.fillRect(0, 0, W, 18);
  ctx.font = '10px serif';
  ctx.fillStyle = '#c2185b';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText('AVOID: 💔', 8, 9);
  ctx.fillText('CATCH: 🌹 +10  🥂 +20  💍 +50', 110, 9);
}

// --- Bonus pop ---
function showPop(text) {
  bonusPop.textContent = text;
  bonusPop.style.opacity = '1';
  clearTimeout(popTimer);
  popTimer = setTimeout(() => { bonusPop.style.opacity = '0'; }, 750);
}

// --- Update ---
function update() {
  if (state !== 'running') return;
  frame++;
  score = Math.floor(frame / 6) + bonus;
  scoreEl.textContent = score;
  speed = 4 + Math.floor(frame / 450) * 0.4;

  // Physics
  if (!(isDucking && bride.grounded)) {
    bride.vy += 0.56;
    bride.y  += bride.vy;
  }
  const gY = GROUND_Y - bride.h;
  if (bride.y >= gY) {
    bride.y = gY;
    bride.vy = 0;
    bride.grounded = true;
    jumpCount = 0;
  }

  // Spawn
  nextSpawn--;
  if (nextSpawn <= 0) {
    spawnGroup();
    nextSpawn = 60 + Math.floor(Math.random() * 60) - Math.min(20, Math.floor(frame / 350));
  }

  // Move
  obstacles.forEach(o => o.x -= speed);
  obstacles = obstacles.filter(o => o.x > -60);
  collectibles.forEach(c => c.x -= speed);
  collectibles = collectibles.filter(c => c.x > -60);

  // Hazard collision → die
  const bx = bride.x - bride.w / 2;
  for (const o of obstacles) {
    if (overlaps(bx, bride.y, bride.w, bride.h, o.x, o.y, o.w, o.h, 6)) {
      die(); return;
    }
  }

  // Collectible collision → score
  collectibles = collectibles.filter(c => {
    if (overlaps(bx, bride.y, bride.w, bride.h, c.x, c.y, c.w, c.h, 3)) {
      bonus += c.pts;
      showPop(`${c.label} +${c.pts}!`);
      return false;
    }
    return true;
  });

  // Petals
  if (frame % 22 === 0) spawnPetal();
  petals.forEach(p => { p.y += p.speed; p.x += p.drift; p.rot += p.rotSpeed; });
  petals = petals.filter(p => p.y < H + 20);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawPetals();
  drawGround();
  obstacles.forEach(drawItem);
  collectibles.forEach(drawItem);
  drawBride();
  drawHUD();

  if (state === 'idle') {
    ctx.fillStyle = 'rgba(255,240,248,0.84)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = "bold 26px 'Dancing Script', cursive";
    ctx.fillStyle = '#c2185b';
    ctx.fillText('💍 Here Comes the Bride 💍', W / 2, H / 2 - 14);
    ctx.font = "13px 'Playfair Display', serif";
    ctx.fillStyle = '#e91e63';
    ctx.fillText('Tap or press Space to start!', W / 2, H / 2 + 14);
  }

  if (state === 'dead') {
    ctx.fillStyle = 'rgba(255,240,248,0.86)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = "bold 22px 'Dancing Script', cursive";
    ctx.fillStyle = '#c2185b';
    ctx.fillText('💔 Heartbreak strikes again!', W / 2, H / 2 - 18);
    ctx.font = "13px 'Playfair Display', serif";
    ctx.fillStyle = '#888';
    ctx.fillText(`Score: ${score}  •  Best: ${best}`, W / 2, H / 2 + 6);
    ctx.fillText('Tap or Space to try again', W / 2, H / 2 + 24);
  }
}

function die() {
  state = 'dead';
  if (score > best) { best = score; bestEl.textContent = best; }
  msg.textContent = score > 40 ? '💍 So close! Try again!' : '🌸 Dodge the heartbreak!';
}

function startGame() {
  state = 'running';
  frame = 0; bonus = 0; score = 0; speed = 4;
  obstacles = []; collectibles = []; petals = [];
  bride.y = GROUND_Y - NORMAL_H; bride.h = NORMAL_H;
  bride.vy = 0; bride.grounded = true;
  jumpCount = 0; isDucking = false; nextSpawn = 85;
  msg.textContent = 'Catch the love, dodge the heartbreak!';
  scoreEl.textContent = '0';
}

// --- Input ---
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (state !== 'running') startGame();
    else brideJump();
  }
  if (e.code === 'ArrowDown' && state === 'running') {
    e.preventDefault();
    startDuck();
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'ArrowDown') stopDuck();
});

// Touch: top 60% = jump, bottom 40% = duck
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state !== 'running') { startGame(); return; }
  const rect = canvas.getBoundingClientRect();
  const relY = e.touches[0].clientY - rect.top;
  if (relY > rect.height * 0.6) startDuck();
  else brideJump();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  stopDuck();
}, { passive: false });

canvas.addEventListener('pointerdown', e => {
  if (e.pointerType === 'touch') return;
  if (state !== 'running') startGame();
  else brideJump();
});

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
